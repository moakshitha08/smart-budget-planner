<div id="editExpenseModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-edit"></i> Edit Expense</h3>
      <span class="close" onclick="closeEditModal()">&times;</span>
    </div>
    <form id="editExpenseForm">
      <input type="hidden" id="editExpenseId">
      <div class="form-group">
        <label>Category</label>
        <select id="editCategory" required>
          <option value="Groceries">Groceries</option>
          <option value="Dining Out">Dining Out</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Shopping">Shopping</option>
          <option value="Coffee">Coffee</option>
          <option value="Subscriptions">Subscriptions</option>
          <option value="Transport">Transport</option>
          <option value="Personal Care">Personal Care</option>
        </select>
      </div>
      <div class="form-group">
        <label>Budget Type</label>
        <span id="editBudgetType" class="badge badge-needs"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="editAmount" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="editDate" required>
        </div>
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <input type="text" id="editDescription" maxlength="100">
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
